server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.mvc.async.request-timeout=-1
logging.level.root=WARN
logging.level.ai.pageindex=INFO
# Set FIREBASE_SERVICE_ACCOUNT env var (base64-encoded service account JSON) to enable
# Firestore persistence. Without it, the app runs with in-memory fallbacks.
firebase.service.account=${FIREBASE_SERVICE_ACCOUNT:}
